<div class="upload-page">
  <div class="upload-container">
    <div class="header">
      <h1>🎯 Analisador de Currículo</h1>
      <p>Análise profissional com IA para profissionais de TI</p>
      <div class="header-actions">
        <span class="user-name">Olá, {{ authService.currentUser()?.name }}</span>
        <button class="btn-history" (click)="goToHistory()">📋 Histórico</button>
        <button class="btn-logout" (click)="logout()">Sair</button>
      </div>
    </div>

    <form [formGroup]="uploadForm" (ngSubmit)="onSubmit()" class="upload-form">

      <div class="section">
        <h3>1. Envie seu currículo</h3>
        <div
          class="file-drop-zone"
          [class.has-file]="selectedFile()"
          [class.drag-over]="dragOver()"
          (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave()"
          (drop)="onDrop($event)">
          <input type="file" id="fileInput" accept=".pdf,.docx,.txt" (change)="onFileSelected($event)" hidden>
          <label for="fileInput" class="file-label">
            <span class="icon">{{ dragOver() ? '📥' : (selectedFile() ? '✅' : '📄') }}</span>
            <span *ngIf="dragOver()">Solte o arquivo aqui</span>
            <span *ngIf="!dragOver() && !selectedFile()">Arraste e solte ou clique para selecionar<br><small>PDF, DOCX ou TXT · máx. 5MB</small></span>
            <span *ngIf="!dragOver() && selectedFile()" class="file-name">{{ selectedFile()!.name }}</span>
          </label>
        </div>
      </div>

      <div class="section">
        <h3>2. Seu contexto profissional</h3>

        <div class="form-group">
          <label>Nível de experiência</label>
          <select formControlName="experienceLevel">
            <option *ngFor="let opt of levelOptions" [value]="opt.value">{{ opt.label }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Especialização</label>
          <select formControlName="specialization">
            <option *ngFor="let opt of specializationOptions" [value]="opt.value">{{ opt.label }}</option>
          </select>
        </div>

        <div class="form-group">
          <label>Objetivo no mercado</label>
          <input type="text" formControlName="marketObjective"
            placeholder="Ex: Conseguir primeiro emprego como dev backend, transição de carreira...">
        </div>

        <div class="form-group">
          <label>Localização atual</label>
          <input type="text" formControlName="currentLocation" placeholder="Ex: Brasil, São Paulo...">
        </div>

        <div class="form-group">
          <label>Pretensão salarial (opcional)</label>
          <input type="number" formControlName="targetSalary" placeholder="Ex: 8000">
        </div>
      </div>

      <div *ngIf="errorMessage()" class="error-message">
        ⚠️ {{ errorMessage() }}
      </div>

      <!-- Progresso durante análise -->
      <div *ngIf="loading()" class="progress-steps">
        <div
          *ngFor="let step of steps; let i = index"
          class="step"
          [class.active]="i === currentStep()"
          [class.done]="i < currentStep()">
          <div class="step-icon">
            <span *ngIf="i < currentStep()">✅</span>
            <span *ngIf="i === currentStep()" class="spinner-small"></span>
            <span *ngIf="i > currentStep()">{{ step.icon }}</span>
          </div>
          <span class="step-label">{{ step.label }}</span>
        </div>
      </div>

      <button type="submit" class="btn-analyze" [disabled]="loading() || !selectedFile()">
        <span *ngIf="!loading()">🚀 Analisar Currículo</span>
        <span *ngIf="loading()">Processando...</span>
      </button>
    </form>
  </div>
</div>
