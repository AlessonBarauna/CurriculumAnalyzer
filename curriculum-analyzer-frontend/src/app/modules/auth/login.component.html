<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <h1>🎯 CurriculumAnalyzer</h1>
      <p>Análise de currículo com IA para profissionais de TI</p>
    </div>

    <div class="auth-tabs">
      <button [class.active]="mode() === 'login'" (click)="setMode('login')">Entrar</button>
      <button [class.active]="mode() === 'register'" (click)="setMode('register')">Criar conta</button>
    </div>

    <!-- LOGIN -->
    <form *ngIf="mode() === 'login'" [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" formControlName="email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Senha</label>
        <input type="password" formControlName="password" placeholder="Sua senha" autocomplete="current-password">
      </div>

      <div *ngIf="errorMessage()" class="error-message">⚠️ {{ errorMessage() }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading() || loginForm.invalid">
        <span *ngIf="!loading()">Entrar</span>
        <span *ngIf="loading()">Entrando...</span>
      </button>
    </form>

    <!-- CADASTRO -->
    <form *ngIf="mode() === 'register'" [formGroup]="registerForm" (ngSubmit)="onRegister()" class="auth-form">
      <div class="form-group">
        <label>Nome</label>
        <input type="text" formControlName="name" placeholder="Seu nome completo" autocomplete="name">
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" formControlName="email" placeholder="seu@email.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label>Senha <span class="hint">(mínimo 6 caracteres)</span></label>
        <input type="password" formControlName="password" placeholder="Crie uma senha" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label>Confirmar senha</label>
        <input type="password" formControlName="confirmPassword" placeholder="Repita a senha" autocomplete="new-password">
      </div>

      <div *ngIf="errorMessage()" class="error-message">⚠️ {{ errorMessage() }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading() || registerForm.invalid">
        <span *ngIf="!loading()">Criar conta</span>
        <span *ngIf="loading()">Criando conta...</span>
      </button>
    </form>

  </div>
</div>
