version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: curriculum_postgres
    restart: always
    environment:
      POSTGRES_DB: curriculum_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: